 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS - Digital Property Verification</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:0;background:#f4f4f4}
header{background:#003366;color:#fff;padding:20px;text-align:center}
section{padding:20px;margin:0 auto;max-width:900px;background:#fff;margin-top:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
input, select, textarea{width:100%;padding:8px;margin:6px 0;border-radius:4px;border:1px solid #ccc;box-sizing:border-box}
button{background:#003366;color:#fff;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;margin-top:10px}
button:hover{background:#0055aa}
label{font-weight:bold}
.verification{font-weight:bold;padding:5px 10px;border-radius:4px;color:#fff;display:inline-block}
.green{background:green}
.yellow{background:orange}
.red{background:red}
.dashboard{display:none;margin-top:20px;padding:20px;border:1px solid #ccc;border-radius:8px;background:#eef}
</style>
</head>
<body>

<header>
<h1>FSTL COMET OS</h1>
<p>Digital Property Verification Platform</p>
</header>

<section>
<h2>Owner Verification Form</h2>

<label>Full Name of Owner</label>
<input type="text" id="name" placeholder="Enter full name">

<label>Country</label>
<select id="country">
  <option value="">Select Country</option>
  <option value="Nigeria">Nigeria</option>
  <option value="Ghana">Ghana</option>
  <option value="Kenya">Kenya</option>
  <option value="South Africa">South Africa</option>
  <option value="United States">United States</option>
  <option value="United Kingdom">United Kingdom</option>
  <!-- Add remaining countries here -->
</select>

<label>NIN / National ID</label>
<input type="text" id="primaryID" placeholder="Enter NIN or Country ID">

<label>BVN / Bank ID</label>
<input type="text" id="secondaryID" placeholder="Enter BVN or Bank ID">

<label>Residential Address</label>
<input type="text" id="resAddress" placeholder="Enter residential address">

<label>Phone Number</label>
<input type="text" id="phone" placeholder="Enter phone number">

<label>Email Address</label>
<input type="email" id="email" placeholder="Enter email">

<label>WhatsApp Number</label>
<input type="text" id="whatsapp" placeholder="Enter WhatsApp number">

<label>Property Address</label>
<input type="text" id="propAddress" placeholder="Enter property address">

<label>Declared Ownership</label>
<select id="claim">
  <option value="">Select Ownership</option>
  <option value="Family">Family</option>
  <option value="Inherited">Inherited</option>
  <option value="Purchased">Purchased</option>
</select>

<label>Reason for Verification</label>
<select id="reason">
  <option value="">Select Reason</option>
  <option value="Sell">Sell</option>
  <option value="Rent">Rent</option>
  <option value="Mortgage Loan">Mortgage Loan</option>
  <option value="Probate">Probate</option>
</select>

<label>
<input type="checkbox" id="declaration"> I declare the above information is accurate
</label>

<button onclick="verify()">Generate Verification</button>

<div class="dashboard" id="dashboard">
<h3>Verification Dashboard</h3>
<p>Owner Name: <span id="dName"></span></p>
<p>PVID: <span id="pvid"></span></p>
<p>Reason: <span id="dReason"></span></p>
<p>Timestamp: <span id="time"></span></p>
<p>Status: <span id="status"></span></p>
<p>CRL: <span id="crl"></span></p>
<p>Suggestions: <span id="suggestions"></span></p>
<canvas id="qr"></canvas>
<button onclick="generatePDF()">Download Verification PDF</button>
</div>
</section>

<script>
let verificationData = {};

function computeCRL(data){
  let score = 5;
  let suggestions = [];
  if(!data.primaryID) {score-=1;suggestions.push("Add NIN/ID");}
  if(!data.secondaryID) {score-=1;suggestions.push("Add BVN/Bank ID");}
  if(!data.phone || !data.email || !data.whatsapp){score-=1;suggestions.push("Complete all contact info");}
  if(!data.resAddress){score-=1;suggestions.push("Add residential address");}
  return {score:score>0?score:1,s:suggestions};
}

function getStatus(score){
  if(score>=4) return "Strong Verification";
  if(score>=2) return "Moderate Verification";
  return "Weak Verification";
}

function getColor(score){
  if(score>=4) return "green";
  if(score>=2) return "yellow";
  return "red";
}

function verify(){
  verificationData = {
    name: document.getElementById("name").value.trim(),
    country: document.getElementById("country").value.trim(),
    primaryID: document.getElementById("primaryID").value.trim(),
    secondaryID: document.getElementById("secondaryID").value.trim(),
    resAddress: document.getElementById("resAddress").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    email: document.getElementById("email").value.trim(),
    whatsapp: document.getElementById("whatsapp").value.trim(),
    propAddress: document.getElementById("propAddress").value.trim(),
    claim: document.getElementById("claim").value.trim(),
    reason: document.getElementById("reason").value.trim()
  };

  if(!verificationData.name){alert("Enter owner name"); return;}
  if(!verificationData.propAddress){alert("Enter property address"); return;}
  if(!verificationData.claim){alert("Select declared ownership"); return;}
  if(!verificationData.reason){alert("Select reason for verification"); return;}
  if(!document.getElementById("declaration").checked){alert("You must confirm declaration"); return;}

  verificationData.id = "PVID-"+Math.floor(Math.random()*1000000);
  verificationData.timeStamp = new Date().toLocaleString();

  let r = computeCRL(verificationData);

  document.getElementById("dName").innerText = verificationData.name;
  document.getElementById("pvid").innerText = verificationData.id;
  document.getElementById("dReason").innerText = verificationData.reason;
  document.getElementById("time").innerText = verificationData.timeStamp;
  document.getElementById("status").innerText = getStatus(r.score);
  document.getElementById("crl").innerText = r.score+"/5";
  document.getElementById("crl").className = "verification " + getColor(r.score);
  document.getElementById("suggestions").innerHTML = r.s.length ? r.s.join("<br>") : "Strong Verification";

  document.getElementById("dashboard").style.display="block";

  let qrData = `
FSTL COMET OS VERIFICATION
PVID:${verificationData.id}
Status:${getStatus(r.score)}
CRL:${r.score}/5
Purpose:${verificationData.reason}
Time:${verificationData.timeStamp}
Issued by FSTL COMET OS
`;
  QRCode.toCanvas(document.getElementById("qr"), qrData);
}

function generatePDF(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();
  let img = document.getElementById("qr").toDataURL("image/png");

  doc.text("FSTL COMET OS VERIFIED PROPERTY REPORT", 20, 20);
  doc.text("Owner: " + verificationData.name, 20, 40);
  doc.text("PVID: " + verificationData.id, 20, 50);
  doc.text("Purpose: " + verificationData.reason, 20, 60);
  doc.text("Timestamp: " + verificationData.timeStamp, 20, 70);
  doc.text("Status: " + document.getElementById("status").innerText, 20, 80);
  doc.text("CRL: " + document.getElementById("crl").innerText, 20, 90);

  doc.text("Explanation:", 20, 110);
  doc.text("This verification acts as a digital guarantor for property transactions.", 20, 120, { maxWidth:170 });
  doc.text("Issued by FSTL COMET OS", 20, 140);
  doc.addImage(img,'PNG',140,30,50,50);

  doc.addPage();
  doc.text("SOP GUIDE",20,20);
  doc.text("1. Input Data",20,40);
  doc.text("2. System Verification",20,50);
  doc.text("3. CRL Generated",20,60);
  doc.text("4. QR + PDF Output",20,70);
  doc.text("5. Proceed to SELL / RENT / MORTGAGE",20,80);

  doc.addPage();
  doc.text("LEGAL NOTICE",20,20);
  doc.text("This document is informational only.",20,40);
  doc.text("No legal ownership guaranteed.",20,50);
  doc.text("False input subject to criminal law.",20,60);
  doc.text("TERMS",20,90);
  doc.text("1. Not a title document",20,110);
  doc.text("2. Based on user input",20,120);
  doc.text("3. Requires legal oversight",20,130);

  doc.save("FSTL_COMET_OS.pdf");
}
</script>

</body>
</html>
