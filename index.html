<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS - Digital Property Verification</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
html, body {
  margin:0; padding:0; height:100%; width:100%;
  font-family: Arial, sans-serif;
  background: #f9f9f9;
}
#landing, #formPage {
  min-height: 100vh;
  width:100%;
  padding: 40px;
  box-sizing: border-box;
  background:#fff;
}
h1,h2,h3 { margin-bottom: 20px; }
label { display:block; margin-top:15px; }
input, select { width:100%; padding:10px; margin-top:5px; }
button { margin-top:20px; padding:15px; width:100%; background:#007bff; color:#fff; border:none; cursor:pointer; font-size:16px; }
#qr { margin-top:20px; }
#crl { font-weight:bold; }
</style>
</head>
<body>

<!-- LANDING PAGE -->
<div id="landing">
  <h1>FSTL COMET OS</h1>
  <h3>Digital Property Verification Platform</h3>
  <canvas id="landingQR"></canvas>
  <p>Transforming Property into Trusted Capital</p>
  <button id="startBtn">Start Verification</button>
</div>

<!-- FORM PAGE -->
<div id="formPage" style="display:none;">
  <h2>Owner Verification Form</h2>
  <label>Full Name of Owner:</label>
  <input type="text" id="ownerName" required>

  <label>NIN / National ID:</label>
  <input type="text" id="nin">

  <label>BVN / Bank ID:</label>
  <input type="text" id="bvn">

  <label>Phone:</label>
  <input type="tel" id="phone">

  <label>Email:</label>
  <input type="email" id="email">

  <label>WhatsApp:</label>
  <input type="tel" id="whatsapp">

  <label>Country:</label>
  <select id="country">
