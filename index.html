<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#f5f7fa;}
#landing{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#0b4f6c;color:#fff;text-align:center;padding:20px;}
#app{display:none;padding:20px;max-width:900px;margin:auto;}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
input,textarea,select{width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:12px;background:#0b4f6c;color:#fff;border:none;border-radius:6px;cursor:pointer;}
.verification{padding:6px 10px;border-radius:4px;color:#fff;font-weight:bold;}
.red{background:red;} .orange{background:orange;} .green{background:green;}
.qr{text-align:center;margin-top:10px;}
.suggestions{font-size:13px;margin-top:10px;}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
<h1>FSTL COMET OS</h1>
<p>Digital Property Verification Platform</p>
<canvas id="sampleQR"></canvas>
<p>Scan to preview verification</p>
<button onclick="start()">Start Verification</button>
</div>

<!-- APP -->
<div id="app">

<div class="card">
<h3>Owner Verification</h3>

<label>Landed Property Owner / Claimant Name</label>
<input id="name" placeholder="Full Name of Owner">

<select id="country">
<option value="">Select Country</option>
<option>Nigeria</option>
<option>United States</option>
<option>United Kingdom</option>
<option>Canada</option>
<option>India</option>
<!-- Add other countries as needed -->
</select>

<input id="primaryID" placeholder="National ID (NIN)">
<input id="secondaryID" placeholder="Bank / Financial ID (BVN)">
<textarea id="resAddress" placeholder="Residential Address"></textarea>

<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email Address">
<input id="whatsapp" placeholder="WhatsApp Number">

<select id="reason">
<option value="">Reason for Verification</option>
<option>Sell Property</option>
<option>Rent Property</option>
<option>Mortgage / Loan</option>
<option>Probate / Estate</option>
<option>General Verification</option>
</select>

<label>
<input type="checkbox" id="declaration">
 I confirm that all information provided is true and accurate
</label>

</div>

<div class="card">
<h3>Property Verification</h3>

<textarea id="propAddress" placeholder="Property Address"></textarea>

<select id="claim">
<option value="">Declared Ownership</option>
<option>Family</option>
<option>Inherited</option>
<option>Purchased</option>
</select>

</div>

<button onclick="verify()">Generate Verification</button>

<div id="dashboard" class="card" style="display:none;">
<h3>Verification Output</h3>

<p><b>Name:</b> <span id="dName"></span></p>
<p><b>PVID:</b> <span id="pvid"></span></p>
<p><b>Purpose:</b> <span id="dReason"></span></p>
<p><b>Timestamp:</b> <span id="time"></span></p>
<p><b>Status:</b> <span id="status"></span></p>
<p><b>CRL (1–5):</b> <span id="crl" class="verification"></span></p>

<div id="suggestions" class="suggestions"></div>

<div class="qr"><canvas id="qr"></canvas></div>

<h4>Next Actions</h4>
<button onclick="alert('SELL FLOW')">SELL</button>
<button onclick="alert('RENT FLOW')">RENT</button>
<button onclick="alert('MORTGAGE FLOW')">MORTGAGE LOAN</button>

<button onclick="generatePDF()">Download Verification PDF</button>
</div>

</div>

<script>

// Landing QR
QRCode.toCanvas(document.getElementById("sampleQR"), "FSTL COMET OS DEMO");

// Start
function start(){
landing.style.display="none";
app.style.display="block";
}

// CRL Logic
function computeCRL(d){
let score=1, s=[];
if(d.name && d.resAddress && d.propAddress){score=2;} else{s.push("Complete core identity & address");}
if(score>=2 && d.claim){score=3;} else{s.push("Select ownership");}
if(score>=3 && d.phone && d.email && d.whatsapp){score=4;} else{s.push("Add full contact details (Phone, Email, WhatsApp)");}
if(score>=4 && d.primaryID && d.secondaryID){score=5;} else{s.push("Provide valid ID (NIN & BVN)");}
return {score,s};
}

// Status
function getStatus(score){
if(score<=2) return "WEAK";
if(score==3) return "MODERATE";
return "STRONG";
}

// Color
function getColor(score){
if(score<=2) return "red";
if(score==3) return "orange";
return "green";
}

// VERIFY
function verify(){

// Trim values to avoid spaces
let d={
name:name.value.trim(),
country:country.value.trim(),
primaryID:primaryID.value.trim(),
secondaryID:secondaryID.value.trim(),
resAddress:resAddress.value.trim(),
phone:phone.value.trim(),
email:email.value.trim(),
whatsapp:whatsapp.value.trim(),
propAddress:propAddress.value.trim(),
claim:claim.value.trim(),
reason:reason.value.trim()
};

// Validate required fields
if(!d.name){alert("Enter owner name"); return;}
if(!d.propAddress){alert("Enter property address"); return;}
if(!d.claim){alert("Select declared ownership"); return;}
if(!d.reason){alert("Select reason for verification"); return;}
if(!declaration.checked){alert("You must confirm declaration"); return;}

// Generate PVID and timestamp
let id="PVID-"+Math.floor(Math.random()*1000000);
let timeStamp=new Date().toLocaleString();

let r=computeCRL(d);

dName.innerText=d.name;
pvid.innerText=id;
dReason.innerText=d.reason;
time.innerText=timeStamp;

status.innerText=getStatus(r.score);

crl.innerText=r.score+"/5";
crl.className="verification "+getColor(r.score);

suggestions.innerHTML = r.s.length ? r.s.join("<br>") : "Strong Verification";

dashboard.style.display="block";

// QR
let qrData=`
FSTL COMET OS VERIFICATION
PVID:${id}
Status:${getStatus(r.score)}
CRL:${r.score}/5
Purpose:${d.reason}
Time:${timeStamp}
Issued by FSTL COMET OS
`;

QRCode.toCanvas(qr,qrData);
}

// PDF
function generatePDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
let img=qr.toDataURL("image/png");

// PAGE 1
doc.text("FSTL COMET OS VERIFIED PROPERTY REPORT",20,20);
doc.text("Owner: "+dName.innerText,20,40);
doc.text("PVID: "+pvid.innerText,20,50);
doc.text("Purpose: "+dReason.innerText,20,60);
doc.text("Timestamp: "+time.innerText,20,70);
doc.text("Status: "+status.innerText,20,80);
doc.text("CRL: "+crl.innerText,20,90);

doc.text("Explanation:",20,110);
doc.text("This verification acts as a digital trust layer for property transactions.",20,120,{maxWidth:170});

doc.text("Issued by FSTL COMET OS",20,140);

doc.addImage(img,'PNG',140,30,50,50);

// PAGE 2
doc.addPage();
doc.text("SOP GUIDE",20,20);
doc.text("1. Input Data",20,40);
doc.text("2. System Verification",20,50);
doc.text("3. CRL Generated",20,60);
doc.text("4. QR + PDF Output",20,70);
doc.text("5. Proceed to SELL / RENT / LOAN",20,80);

// PAGE 3
doc.addPage();
doc.text("LEGAL NOTICE",20,20);
doc.text("This document is informational only.",20,40);
doc.text("No legal ownership guaranteed.",20,50);
doc.text("False input subject to criminal law.",20,60);

doc.text("TERMS",20,90);
doc.text("1. Not a title document",20,110);
doc.text("2. Based on user input",20,120);
doc.text("3. Requires legal oversight",20,130);

doc.save("FSTL_COMET_OS.pdf");
}

</script>

</body>
</html>
