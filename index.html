<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#003366;color:#fff;text-align:center;padding:20px}
section{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:8px}
input,select{width:100%;padding:8px;margin:6px 0}
button{background:#003366;color:#fff;padding:10px;border:none;width:100%;margin-top:10px}
.verification{padding:5px 10px;color:#fff;border-radius:4px}
.green{background:green} .orange{background:orange} .red{background:red}
.dashboard{display:none;margin-top:20px;background:#eef;padding:20px;border-radius:8px}
</style>
</head>

<body>

<header>
<h1>FSTL COMET OS</h1>
<p>Digital Property Verification System</p>
</header>

<section>

<h3>Owner & Property Input</h3>

<input id="name" placeholder="Owner Name">
<input id="country" placeholder="Country">
<input id="primaryID" placeholder="NIN / ID">
<input id="secondaryID" placeholder="BVN / Bank ID">
<input id="resAddress" placeholder="Residential Address">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="whatsapp" placeholder="WhatsApp">
<input id="propAddress" placeholder="Property Address">

<select id="claim">
<option value="">Ownership</option>
<option>Family</option>
<option>Inherited</option>
<option>Purchased</option>
</select>

<select id="reason">
<option value="">Purpose</option>
<option>Sell</option>
<option>Rent</option>
<option>Mortgage</option>
<option>Probate</option>
</select>

<label><input type="checkbox" id="declaration"> Confirm Information</label>

<button onclick="verify()">Generate Verification</button>

<div id="dashboard" class="dashboard">
<p>Name: <span id="dName"></span></p>
<p>PVID: <span id="pvid"></span></p>
<p>CRL: <span id="crl"></span></p>
<p>Status: <span id="status"></span></p>
<p>Suggestions:</p>
<div id="suggestions"></div>
<canvas id="qr"></canvas>
<button onclick="generatePDF()">Download PDF</button>
</div>

</section>

<script>

let verificationData = {};

function computeCRL(d){
let score=1, s=[];
if(d.name && d.propAddress) score=2; else s.push("Add basic identity and property");
if(score>=2 && d.claim) score=3; else s.push("Clarify ownership");
if(score>=3 && d.phone && d.email && d.whatsapp) score=4; else s.push("Add contact details");
if(score>=4 && d.primaryID && d.secondaryID) score=5; else s.push("Add valid ID");
return {score,s};
}

function getStatus(s){
if(s<=2) return "Developing";
if(s==3) return "Improving";
return "Transaction Ready";
}

function getColor(s){
if(s<=2) return "red";
if(s==3) return "orange";
return "green";
}

function verify(){

verificationData={
name:name.value.trim(),
country:country.value.trim(),
primaryID:primaryID.value.trim(),
secondaryID:secondaryID.value.trim(),
resAddress:resAddress.value.trim(),
phone:phone.value.trim(),
email:email.value.trim(),
whatsapp:whatsapp.value.trim(),
propAddress:propAddress.value.trim(),
claim:claim.value.trim(),
reason:reason.value.trim()
};

// NON-BLOCKING GUIDANCE
let guidance=[];
if(!verificationData.name) guidance.push("Add owner name");
if(!verificationData.propAddress) guidance.push("Add property address");
if(!verificationData.claim) guidance.push("Clarify ownership");
if(!verificationData.reason) guidance.push("State purpose");
if(!declaration.checked) guidance.push("Confirm declaration");

// CRL
let r=computeCRL(verificationData);
let suggestions=[...r.s,...guidance];

// IDs
verificationData.id="PVID-"+Math.floor(Math.random()*1000000);
verificationData.time=new Date().toLocaleString();

// Display
dName.innerText=verificationData.name||"—";
pvid.innerText=verificationData.id;
status.innerText=getStatus(r.score);
crl.innerText=r.score+"/5";
crl.className="verification "+getColor(r.score);
suggestions.innerHTML=suggestions.length?suggestions.join("<br>"):"Ready";

// Show
dashboard.style.display="block";

// QR (verification)
let qrData=`
PVID:${verificationData.id}
CRL:${r.score}/5
Status:${getStatus(r.score)}
Time:${verificationData.time}
FSTL COMET OS
`;
QRCode.toCanvas(qr,qrData);

}

function generatePDF(){

const {jsPDF}=window.jspdf;
let doc=new jsPDF();

// SYSTEM QR (front)
let sysQR=document.createElement("canvas");
QRCode.toCanvas(sysQR,"FSTL COMET OS SYSTEM");

// VERIFICATION QR
let verQR=document.getElementById("qr").toDataURL("image/png");

// PAGE 1 — FRONT COVER
doc.text("FSTL COMET OS",20,30);
doc.text("Digital Property Verification",20,40);
doc.text("Trusted Transaction Layer",20,50);
doc.addImage(sysQR.toDataURL(),"PNG",60,70,80,80);

// PAGE 2 — VERIFICATION
doc.addPage();
doc.text("Verification Report",20,20);
doc.text("Owner: "+verificationData.name,20,40);
doc.text("Property: "+verificationData.propAddress,20,50);
doc.text("PVID: "+verificationData.id,20,60);
doc.text("CRL: "+crl.innerText,20,70);
doc.text("Status: "+status.innerText,20,80);
doc.addImage(verQR,"PNG",130,30,60,60);

// PAGE 3 — MEANING
doc.addPage();
doc.text("What This Means",20,20);
doc.text("This verification structures property data for transaction use.",20,40);

// PAGE 4 — VALUE
doc.addPage();
doc.text("Value",20,20);
doc.text("Sell faster, rent with trust, access capital.",20,40);

// PAGE 5 — LEGAL
doc.addPage();
doc.text("Legal",20,20);
doc.text("Informational only. False input subject to law.",20,40);

doc.save("FSTL_COMET_OS.pdf");

}

</script>

</body>
</html>
