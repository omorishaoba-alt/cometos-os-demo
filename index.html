<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS - Collateral Engine + PVID</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
body { font-family: Arial; background:#f5f7fb; margin:0; }
header { background:#0a2a66; color:#fff; padding:15px; text-align:center; }
.container { max-width:750px; margin:20px auto; padding:15px; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:15px; }
input,select { width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:6px; }
button { width:100%; padding:12px; background:#0a2a66; color:#fff; border:none; border-radius:8px; cursor:pointer; }
.result { text-align:center; padding:20px; }
.score { font-size:28px; font-weight:bold; }
.small { font-size:13px; color:#555; }
.bar { height:8px; background:#ddd; border-radius:5px; margin:5px 0; }
.fill { height:8px; background:#0a2a66; border-radius:5px; }
#qrcode { margin-top:15px; }
.pending { background:#fff3cd; border:1px solid #ffeeba; padding:10px; border-radius:6px; margin-top:10px; color:#856404; }
</style>
</head>
<body>

<header>
<h2>FSTL COMET OS</h2>
<p>Collateral Readiness + PVID + Pending Verification</p>
</header>

<div class="container">

<!-- Owner Section -->
<div class="card">
<h4>1. Owner (Identity)</h4>
<select id="ownerCountry" onchange="updateOwnerIDs()">
<option value="NG">Nigeria</option>
<option value="US">USA</option>
<option value="UK">UK</option>
<option value="CA">Canada</option>
<option value="DE">Germany</option>
</select>
<div id="ownerIDFields">
  <input id="ownerName" placeholder="Full Name">
  <input id="ownerID" placeholder="NIN">
  <input id="ownerBank" placeholder="BVN">
</div>
</div>

<!-- Agent Section -->
<div class="card">
<h4>2. Agent (Identity)</h4>
<select id="agentCountry" onchange="updateAgentIDs()">
<option value="NG">Nigeria</option>
<option value="US">USA</option>
<option value="UK">UK</option>
<option value="CA">Canada</option>
<option value="DE">Germany</option>
</select>
<div id="agentIDFields">
  <input id="agentName" placeholder="Agent Name">
  <input id="agentID" placeholder="NIN">
  <input id="agentBank" placeholder="BVN">
</div>
</div>

<!-- Property Section -->
<div class="card">
<h4>3. Property</h4>
<input id="propertyAddress" placeholder="Property Address">
<select id="propertyType">
<option>Residential</option>
<option>Commercial</option>
<option>Land</option>
</select>
<input id="propertyRef" placeholder="Survey / Registry / Document Ref (Optional)">
<input id="transactionRef" placeholder="Transaction / Payment Ref (Optional)">
</div>

<button onclick="runCRL()">Assess Collateral Strength & Generate PVID</button>

<div id="result" class="card result" style="display:none;"></div>
<div id="qrcode" class="card result" style="display:none;"></div>
<div id="pendingInfo" class="card pending" style="display:none;"></div>

</div>

<script>
// Dynamic ID fields for global participants
function updateOwnerIDs(){
  const c = document.getElementById("ownerCountry").value;
  const f = document.getElementById("ownerIDFields");
  if(c=="NG"){ f.innerHTML = `
    <input id="ownerName" placeholder="Full Name">
    <input id="ownerID" placeholder="NIN">
    <input id="ownerBank" placeholder="BVN">`; }
  else if(c=="US"){ f.innerHTML = `
    <input id="ownerName" placeholder="Full Name">
    <input id="ownerID" placeholder="SSN">
    <input id="ownerBank" placeholder="Routing Number">`; }
  else if(c=="UK"){ f.innerHTML = `
    <input id="ownerName" placeholder="Full Name">
    <input id="ownerID" placeholder="NINo">
    <input id="ownerBank" placeholder="Sort Code">`; }
  else if(c=="CA"){ f.innerHTML = `
    <input id="ownerName" placeholder="Full Name">
    <input id="ownerID" placeholder="SIN">
    <input id="ownerBank" placeholder="Bank Account Number">`; }
  else if(c=="DE"){ f.innerHTML = `
    <input id="ownerName" placeholder="Full Name">
    <input id="ownerID" placeholder="Steuer-ID">
    <input id="ownerBank" placeholder="IBAN">`; }
}

function updateAgentIDs(){
  const c = document.getElementById("agentCountry").value;
  const f = document.getElementById("agentIDFields");
  if(c=="NG"){ f.innerHTML = `
    <input id="agentName" placeholder="Agent Name">
    <input id="agentID" placeholder="NIN">
    <input id="agentBank" placeholder="BVN">`; }
  else if(c=="US"){ f.innerHTML = `
    <input id="agentName" placeholder="Agent Name">
    <input id="agentID" placeholder="SSN">
    <input id="agentBank" placeholder="Routing Number">`; }
  else if(c=="UK"){ f.innerHTML = `
    <input id="agentName" placeholder="Agent Name">
    <input id="agentID" placeholder="NINo">
    <input id="agentBank" placeholder="Sort Code">`; }
  else if(c=="CA"){ f.innerHTML = `
    <input id="agentName" placeholder="Agent Name">
    <input id="agentID" placeholder="SIN">
    <input id="agentBank" placeholder="Bank Account Number">`; }
  else if(c=="DE"){ f.innerHTML = `
    <input id="agentName" placeholder="Agent Name">
    <input id="agentID" placeholder="Steuer-ID">
    <input id="agentBank" placeholder="IBAN">`; }
}

// Generate simple PVID
function generatePVID() { return 'PVID-' + Math.random().toString(36).substr(2,9).toUpperCase(); }

// CRL engine with Pending Verification info
function runCRL(){

let score = 0;
let pending = [];

// Signals
const ownerName = document.getElementById("ownerName").value;
const ownerID = document.getElementById("ownerID").value;
const ownerBank = document.getElementById("ownerBank").value;
let identity = (ownerName && ownerID && ownerBank) ? 25 : 10;
if(identity<25) pending.push("Owner identity incomplete.");

score += identity;

let ownership = (ownerID && ownerBank) ? 20 : 10;
if(ownership<20) pending.push("Ownership link weak.");

score += ownership;

const propertyAddress = document.getElementById("propertyAddress").value;
let property = propertyAddress ? 25 : 10;
if(property<25) pending.push("Property traceability missing.");

score += property;

const transactionRef = document.getElementById("transactionRef").value;
const propertyRef = document.getElementById("propertyRef").value;
let financial = (transactionRef || propertyRef) ? 25 : 5;
if(financial<25) pending.push("Financial references weak.");

score += financial;

// CRL calculation
let crl = Math.ceil(score / 25);
let status = crl<=2?"Weak":crl==3?"Tradable":crl==4?"Finance-Ready":"Institutional Grade";

// Generate PVID
let pvid = generatePVID();

// Display results
document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML = `
<div><strong>PVID:</strong> ${pvid}</div>
<div class="score">CRL ${crl}</div>
<div>Status: ${status}</div>

<br>
<div class="small">Identity Integrity</div><div class="bar"><div class="fill" style="width:${identity}%"></div></div>
<div class="small">Ownership Link</div><div class="bar"><div class="fill" style="width:${ownership}%"></div></div>
<div class="small">Property Traceability</div><div class="bar"><div class="fill" style="width:${property}%"></div></div>
<div class="small">Financial Signal</div><div class="bar"><div class="fill" style="width:${financial}%"></div></div>
`;

// Pending Verification Box
if(pending.length>0){
document.getElementById("pendingInfo").style.display="block";
document.getElementById("pendingInfo").innerHTML = `
<strong>Pending Verification Notes:</strong><br>
<ul>${pending.map(x=>`<li>${x}</li>`).join('')}</ul>
<span>Improving these signals increases trust and liquidity for market participation.</span>`;
}else{
document.getElementById("pendingInfo").style.display="none";
}

// Generate QR
document.getElementById("qrcode").style.display="block";
QRCode.toCanvas(document.getElementById('qrcode'), JSON.stringify({
  PVID: pvid,
  OwnerName: ownerName,
  AgentName: document.getElementById("agentName").value,
  PropertyAddress: propertyAddress,
  CRL: crl,
  Status: status,
  PendingNotes: pending
}), function (error) { if(error) console.error(error); });

}
</script>

</body>
</html>
